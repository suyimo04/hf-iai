server:
  port: 8080

spring:
  application:
    name: huafen-system

  datasource:
    url: jdbc:mysql://localhost:3306/huafen_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: suyimo.04
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
